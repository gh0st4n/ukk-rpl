<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Diskon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Kalkulator Diskon</h1>
    <form id="discountForm" onsubmit="return false;">
      <label for="itemName">Nama Barang:</label>
      <input type="text" id="itemName" placeholder="Masukkan nama barang" required>

      <label for="price">Harga Barang (Rp):</label>
      <input type="text" id="price" placeholder="Contoh: 100.000" required>

      <label for="discountType">Jenis Diskon:</label>
      <select id="discountType">
        <option value="percent">Persentase (%)</option>
        <option value="nominal">Nominal (Rp)</option>
      </select>

      <label for="discountValue">Nilai Diskon:</label>
      <input type="text" id="discountValue" placeholder="Contoh: 20 atau 10.000" required>

      <button type="button" onclick="calculateDiscount()">Hitung Diskon</button>
    </form>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
